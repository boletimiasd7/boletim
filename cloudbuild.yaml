steps:
  # Passo 1: Construir a imagem do container usando o Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/boletim:$COMMIT_SHA", "."]

  # Passo 2: Enviar a imagem construída para o Artifact Registry (ou Container Registry)
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/boletim:$COMMIT_SHA"]

  # Passo 3: Implantar a imagem no Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "boletim" # Substitua 'boletim' pelo nome do seu serviço Cloud Run
      - "--image"
      - "gcr.io/$PROJECT_ID/boletim:$COMMIT_SHA"
      - "--region"
      - "$LOCATION" # Substitua pela sua região (ex: southamerica-east1)
      - "--platform"
      - "managed" # Opcional: Especifica plataforma gerenciada
images:
  - "gcr.io/$PROJECT_ID/boletim:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY